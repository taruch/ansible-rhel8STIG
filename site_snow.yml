- name: DISA RHEL8 STIG from Jan 2025
  hosts: "{{ _hosts | default('all') }}"
  gather_facts: true
  become: true
  vars:
    change_fact: false
    job_url: "https://ansible_controller/execution/jobs/command/2/output"

 
  tasks:

#    - name: List running jobs for the network_STIG_change.yml playbook
#      ansible.controller.job_list:
#        status: running
#        query: {"name": "RHEL8 STIG - Validate"}
#      check_mode: false
#      run_once: true
#      delegate_to: localhost
#      register: STIG_job
# 
#    - name: Derive the URL for the currently running job template
#      when: STIG_job
#      ansible.builtin.set_fact:
#        job_url: "https://{{ ansible_controller }}/execution/jobs/command/{{ STIG_job.results[0].id }}/output"
#      check_mode: false
#      run_once: true
#      delegate_to: localhost
 
    - name: Run DISA RHEL8 STIG
      when: (ansible_facts['distribution'] == "RedHat" and ansible_facts['distribution_major_version'] == "8")
      vars:
        ignore_all_errors: False
      ansible.builtin.include_role:
        name: rhel8STIG
      register: rhel8_stig_reg

    - name: Force all notified handlers to run at this point, not waiting for normal sync points
      ansible.builtin.meta: flush_handlers
      check_mode: false
 
    - name: Debug
      ansible.builtin.debug:
        var: change_fact
      check_mode: false
 
    - name: Pause for 20 seconds to wait for handlers to flush
      ansible.builtin.pause:
        seconds: 20
 
    - name: Set change Number
      ansible.builtin.set_stats:
        data:
          job_url: "{{ job_url }}"
          change_fact: "{{ change_fact }}"

